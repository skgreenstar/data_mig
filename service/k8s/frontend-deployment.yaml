apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: strategicai
  labels:
    app: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend
        image: ghcr.io/greenstar/strategic-ai-frontend:latest
        ports:
        - containerPort: 80
        envFrom:
        - configMapRef:
            name: strategicai-config
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: strategicai
spec:
  selector:
    app: frontend
  ports:
  - protocol: TCP
    port: 80
    targetPort: 80
