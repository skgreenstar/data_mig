apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-dev
  namespace: strategicai
  labels:
    app: frontend-dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend-dev
  template:
    metadata:
      labels:
        app: frontend-dev
    spec:
      containers:
      - name: frontend
        image: ghcr.io/greenstar/strategic-ai-frontend:dev
        ports:
        - containerPort: 5173
        envFrom:
        - configMapRef:
            name: strategicai-dev-config
        env:
        - name: VITE_API_PROXY
          value: "http://backend-dev:8000"
        - name: VITE_API_BASE
          value: "/api"
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-dev
  namespace: strategicai
spec:
  type: NodePort
  selector:
    app: frontend-dev
  ports:
  - protocol: TCP
    port: 80
    targetPort: 5173
    nodePort: 30777
