apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-dev
  namespace: strategicai
  labels:
    app: backend-dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend-dev
  template:
    metadata:
      labels:
        app: backend-dev
    spec:
      containers:
      - name: backend
        image: ghcr.io/greenstar/strategic-ai-backend:dev
        ports:
        - containerPort: 8000
        envFrom:
        - configMapRef:
            name: strategicai-dev-config
        - secretRef:
            name: strategicai-dev-secret
        env:
        - name: RELOAD
          value: "true"
        volumeMounts:
        - name: logs
          mountPath: /app/logs
      volumes:
      - name: logs
        persistentVolumeClaim:
          claimName: backend-logs-dev-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: backend-dev
  namespace: strategicai
spec:
  type: NodePort
  selector:
    app: backend-dev
  ports:
  - protocol: TCP
    port: 8000
    targetPort: 8000
    nodePort: 30800
